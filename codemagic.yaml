workflows:
  avo-telemetria-ios:
    name: Compilación AVO Performance
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.avoperformance.horse

    scripts:
      - name: Localizar proyecto SwiftPM
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          pwd
          ls -la
          if [ -d "AVO.swiftpm" ]; then
            echo "AVO_PROJECT_DIR=$PWD/AVO.swiftpm" >> $CM_ENV
          else
            FOUND=$(find "$CM_BUILD_DIR" -maxdepth 4 -type d -name "AVO.swiftpm" | head -1)
            if [ -z "$FOUND" ]; then
              echo "ERROR: No encuentro AVO.swiftpm dentro de $CM_BUILD_DIR"
              find "$CM_BUILD_DIR" -maxdepth 3 -type d | sort
              exit 1
            fi
            echo "AVO_PROJECT_DIR=$FOUND" >> $CM_ENV
          fi

      - name: Configurar perfiles
        script: |
          xcode-project use-profiles

      - name: Limpiar modelo CoreML roto
        script: |
          cd "$AVO_PROJECT_DIR"
          perl -0pi -e 's/\s*\.process\("AVOHorsePose\.mlpackage"\),//g' Package.swift
          if [ -d "AVOHorsePose.mlpackage" ]; then
            mkdir -p "$CM_BUILD_DIR/DisabledModels"
            mv AVOHorsePose.mlpackage "$CM_BUILD_DIR/DisabledModels/AVOHorsePose.mlpackage"
          fi

      - name: Build Swift Playgrounds IPA
        script: |
          cd "$AVO_PROJECT_DIR"

          PROFILE_UUID=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -print0 | while IFS= read -r -d '' file; do
            security cms -D -i "$file" > /tmp/profile.plist 2>/dev/null || true
            APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist 2>/dev/null || true)
            UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist 2>/dev/null || true)
            if echo "$APP_ID" | grep -q "com.avoperformance.horse"; then
              echo "$UUID"
              break
            fi
          done)

          echo "PROFILE_UUID=$PROFILE_UUID"
          if [ -z "$PROFILE_UUID" ]; then
            echo "ERROR: No encuentro provisioning profile para com.avoperformance.horse"
            exit 1
          fi

          # AVO BUILD46 HARD LOCK
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.3.1" "$AVO_PROJECT_DIR/../AVOPerformanceHorse/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 46" "$AVO_PROJECT_DIR/../AVOPerformanceHorse/Info.plist" || true
          perl -0pi -e 's/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = 46;/g; s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = 1.3.1;/g' "$AVO_PROJECT_DIR/../AVOPerformanceHorse.xcodeproj/project.pbxproj" || true

          echo "AVO VERSION CHECK BEFORE ARCHIVE:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$AVO_PROJECT_DIR/../AVOPerformanceHorse/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$AVO_PROJECT_DIR/../AVOPerformanceHorse/Info.plist" || true

          mkdir -p "$CM_BUILD_DIR/build/ios/archive"
          mkdir -p "$CM_BUILD_DIR/build/ios/ipa"

          echo "AVAILABLE SCHEMES:"
          xcodebuild -list || true

          xcodebuild archive \
            -scheme "AVO Performance Horse" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/AVOPerformanceHorse.xcarchive" \
            DEVELOPMENT_TEAM=4J2D6P5BJX \
            PRODUCT_BUNDLE_IDENTIFIER=com.avoperformance.horse \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            MARKETING_VERSION=1.3.1 \
            CURRENT_PROJECT_VERSION=46 \
            COREML_CODEGEN_LANGUAGE=Swift \
            COMPILER_INDEX_STORE_ENABLE=NO

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>4J2D6P5BJX</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.avoperformance.horse</key>
              <string>Codemagic</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/AVOPerformanceHorse.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - DisabledModels/AVOHorsePose.mlpackage

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
